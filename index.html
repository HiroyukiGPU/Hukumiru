<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>服装提案</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <div class="location-info">
        <span id="location-name" class="location-name">取得中...</span>
        <span id="current-date" class="date-label"></span>
      </div>
    </div>
  </header>

  <main class="app-main">
    <div id="cards-container" class="cards-container">
      <!-- JS でカード挿入 -->
    </div>
  </main>

  <button id="settings-btn" class="settings-fab" aria-label="設定を開く">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </button>

  <!-- 設定モーダル -->
  <div id="settings-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title" aria-describedby="modal-description" hidden>
    <div class="modal-dialog">
      <button type="button" id="settings-close" class="modal-close" aria-label="設定を閉じる">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M18 6 6 18"/>
          <path d="m6 6 12 12"/>
        </svg>
      </button>

      <div class="modal-header">
        <p class="modal-eyebrow">Customize Time Periods</p>
        <h2 id="modal-title" class="modal-title">時間帯設定</h2>
        <p id="modal-description" class="modal-description">
          朝・昼・夜の区切りを、あなたの生活リズムに合わせて調整できます。
        </p>
      </div>

      <form id="settings-form" novalidate>
        <div class="settings-intro" aria-hidden="true">
          <span class="settings-intro-badge">24時間表記</span>
          <p>0〜23の整数で入力してください。保存するとカード表示にすぐ反映されます。</p>
        </div>

        <div class="period-settings">
          <fieldset class="period-fieldset" data-period="morning">
            <legend class="sr-only">朝</legend>
            <div class="period-card-header">
              <div class="period-heading">
                <span class="period-chip">朝</span>
                <p class="period-note">外出前の体感に合わせる時間帯</p>
              </div>
              <output id="morning-preview" class="period-preview" for="morning-start morning-end">5時〜10時</output>
            </div>
            <div class="time-input-grid">
              <label class="time-input" for="morning-start">
                <span class="time-label">開始</span>
                <span class="time-control">
                  <input type="number" id="morning-start" min="0" max="23" step="1" inputmode="numeric">
                  <span class="time-unit">時</span>
                </span>
              </label>
              <label class="time-input" for="morning-end">
                <span class="time-label">終了</span>
                <span class="time-control">
                  <input type="number" id="morning-end" min="0" max="23" step="1" inputmode="numeric">
                  <span class="time-unit">時</span>
                </span>
              </label>
            </div>
          </fieldset>

          <fieldset class="period-fieldset" data-period="afternoon">
            <legend class="sr-only">昼</legend>
            <div class="period-card-header">
              <div class="period-heading">
                <span class="period-chip">昼</span>
                <p class="period-note">日中の服装提案に使う時間帯</p>
              </div>
              <output id="afternoon-preview" class="period-preview" for="afternoon-start afternoon-end">10時〜16時</output>
            </div>
            <div class="time-input-grid">
              <label class="time-input" for="afternoon-start">
                <span class="time-label">開始</span>
                <span class="time-control">
                  <input type="number" id="afternoon-start" min="0" max="23" step="1" inputmode="numeric">
                  <span class="time-unit">時</span>
                </span>
              </label>
              <label class="time-input" for="afternoon-end">
                <span class="time-label">終了</span>
                <span class="time-control">
                  <input type="number" id="afternoon-end" min="0" max="23" step="1" inputmode="numeric">
                  <span class="time-unit">時</span>
                </span>
              </label>
            </div>
          </fieldset>

          <fieldset class="period-fieldset" data-period="night">
            <legend class="sr-only">夜</legend>
            <div class="period-card-header">
              <div class="period-heading">
                <span class="period-chip">夜</span>
                <p class="period-note">帰宅後や夜の外出に近い時間帯</p>
              </div>
              <output id="night-preview" class="period-preview" for="night-start night-end">16時〜23時</output>
            </div>
            <div class="time-input-grid">
              <label class="time-input" for="night-start">
                <span class="time-label">開始</span>
                <span class="time-control">
                  <input type="number" id="night-start" min="0" max="23" step="1" inputmode="numeric">
                  <span class="time-unit">時</span>
                </span>
              </label>
              <label class="time-input" for="night-end">
                <span class="time-label">終了</span>
                <span class="time-control">
                  <input type="number" id="night-end" min="0" max="23" step="1" inputmode="numeric">
                  <span class="time-unit">時</span>
                </span>
              </label>
            </div>
          </fieldset>
        </div>

        <p id="settings-error" class="settings-error" role="alert" hidden></p>

        <div class="modal-actions">
          <button type="button" id="settings-cancel" class="btn btn-secondary">キャンセル</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
