<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>服装提案</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <div class="location-info">
        <span id="location-name" class="location-name">取得中...</span>
        <span id="current-date" class="date-label"></span>
      </div>
    </div>
  </header>

  <main class="app-main">
    <div id="cards-container" class="cards-container">
      <!-- JS でカード挿入 -->
    </div>
  </main>

  <button id="settings-btn" class="settings-fab" aria-label="設定を開く">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </button>

  <!-- 設定モーダル -->
  <div id="settings-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
    <div class="modal-dialog">
      <h2 id="modal-title" class="modal-title">時間帯設定</h2>
      <form id="settings-form">
        <fieldset class="period-fieldset">
          <legend>朝</legend>
          <label for="morning-start">開始</label>
          <input type="number" id="morning-start" min="0" max="23" step="1">
          <label for="morning-end">終了</label>
          <input type="number" id="morning-end" min="0" max="23" step="1">
        </fieldset>
        <fieldset class="period-fieldset">
          <legend>昼</legend>
          <label for="afternoon-start">開始</label>
          <input type="number" id="afternoon-start" min="0" max="23" step="1">
          <label for="afternoon-end">終了</label>
          <input type="number" id="afternoon-end" min="0" max="23" step="1">
        </fieldset>
        <fieldset class="period-fieldset">
          <legend>夜</legend>
          <label for="night-start">開始</label>
          <input type="number" id="night-start" min="0" max="23" step="1">
          <label for="night-end">終了</label>
          <input type="number" id="night-end" min="0" max="23" step="1">
        </fieldset>
        <div class="modal-actions">
          <button type="button" id="settings-cancel" class="btn btn-secondary">キャンセル</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
